<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dame's Interactive Terminal Portfolio">
    <title>Dame | Terminal Portfolio</title>
    <!-- Google Fonts for retro monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="crt-overlay"></div>
    <div id="terminal-container">
        <div id="terminal-output">
            <!-- Output will be injected here by JS -->
        </div>
        <div id="input-line">
            <span class="prompt">dame@portfolio:~$</span>
            <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" autofocus>
            <span id="typed-input"></span><span class="cursor">&nbsp;</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
